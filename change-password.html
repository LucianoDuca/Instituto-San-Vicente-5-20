<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar contraseña | Instituto San Vicente</title>

  <link rel="stylesheet" href="css/panel.css">
</head>
<body>

  <main class="panel-page">
    <section class="panel-card" style="max-width: 520px;">

      <div class="panel-top">
        <div>
          <span class="panel-kicker">SEGURIDAD</span>
          <h1>Nueva contraseña</h1>
          <p class="panel-user">
            Debés cambiar tu contraseña temporal antes de ingresar al portal.
          </p>
        </div>
      </div>

      <form id="passwordForm" class="change-password-form">
        <input
          type="password"
          name="password"
          placeholder="Nueva contraseña"
          required
        >

        <input
          type="password"
          name="confirmPassword"
          placeholder="Confirmar contraseña"
          required
        >

        <p id="passwordStatus" class="change-password-status"></p>

        <button type="submit" id="passwordBtn">
          Actualizar contraseña
        </button>
      </form>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/change-password.js"></script>

</body>
</html>
